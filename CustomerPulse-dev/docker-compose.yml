services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: customerpulse-backend
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - customerpulse

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-}
    container_name: customerpulse-frontend
    restart: unless-stopped
    networks:
      - customerpulse

  nginx:
    image: nginx:1.27-alpine
    container_name: customerpulse-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - customerpulse

networks:
  customerpulse:
    driver: bridge
