name: Backend Tests

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  backend-tests:
    name: Pytest Compliance Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend test dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Run backend tests with compliance coverage
        working-directory: backend
        env:
          DATABASE_URL: postgresql://user:pass@localhost/customerpulse_test
          BEDROCK_API_KEY: test-key
        run: pytest
