[pytest]
testpaths =
    tests
    app/compliance/explainability/tests
    app/compliance/reporting/tests
python_files = test_*.py
asyncio_mode = auto
cache_dir = C:/tmp/customerpulse-pytest-cache
addopts =
    --strict-markers
    --cov=app.compliance.engine
    --cov=app.compliance.models
    --cov=app.compliance.risk_aggregator
    --cov=app.compliance.rule_registry
    --cov=app.compliance.service
    --cov=app.compliance.sla_interpreter
    --cov=app.compliance.storage_models
    --cov=app.compliance.explainability
    --cov-report=term-missing
    --cov-report=xml:coverage.xml
    --cov-fail-under=90