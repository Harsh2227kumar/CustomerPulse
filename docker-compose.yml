services:
  backend:
    image: ${BACKEND_IMAGE:?Set BACKEND_IMAGE to the published backend container image}
    container_name: customerpulse-backend
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - customerpulse

  nginx:
    image: nginx:1.27-alpine
    container_name: customerpulse-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - customerpulse

networks:
  customerpulse:
    driver: bridge
