services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-}
    container_name: customerpulse-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
