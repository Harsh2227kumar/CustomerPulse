services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: customerpulse-backend
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - customerpulse

networks:
  customerpulse:
    driver: bridge
